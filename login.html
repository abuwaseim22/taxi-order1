<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل دخول</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1e40af;
}

#msg{
  margin-top:10px;
  color:#111;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل دخول 🚕</h2>

<!-- 🔥 رقم الهاتف -->
<input id="phone" placeholder="رقم الهاتف">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg"></p>
</div>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// 🔐 Login (Phone → hidden email)
function login(){

  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("password").value;

  if(!phone || !pass){
    document.getElementById("msg").innerText = "عبّي البيانات ❌";
    return;
  }

  let email = phone + "@taxi.com";

  auth.signInWithEmailAndPassword(email, pass)
  .then(u=>{

    localStorage.setItem("driverId", u.user.uid);

    document.getElementById("msg").innerText = "تم الدخول بنجاح ✅";

    setTimeout(()=>{
      window.location.href = "index.html";
    },800);

  })
  .catch(e=>{
    document.getElementById("msg").innerText = e.message;
  });

}

</script>

</body>
</html>
