<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل دخول</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل دخول 🚕</h2>

<input id="phone" placeholder="رقم الهاتف">
<input id="password" type="password">

<button onclick="login()">دخول</button>
<p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com"
});

function login(){

  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("password").value;

  if(!phone || !pass){
    msg.innerText="عبّي البيانات";
    return;
  }

  let email = phone+"@taxi.com";

  firebase.auth().signInWithEmailAndPassword(email,pass)
  .then(u=>{
    localStorage.setItem("driverId", u.user.uid);
    location.href="index.html";
  })
  .catch(e=>{
    msg.innerText=e.message;
  });

}
</script>

</body>
</html>
