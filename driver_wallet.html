<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>محفظة السائق</title>
</head>

<body>

<h2>محفظة السائق 💰</h2>
<h1 id="balance">0 JD</h1>
<ul id="list"></ul>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);

const driverId = "driver123";

const bal = document.getElementById("balance");
const list = document.getElementById("list");

firebase.database()
.ref("wallets/drivers/"+driverId)
.on("value", snap=>{

  const data = snap.val() || {balance:0, transactions:{}};

  bal.innerText = data.balance + " JD";

  list.innerHTML = "";

  Object.entries(data.transactions || {})
  .reverse()
  .forEach(([k,v])=>{
    list.innerHTML += `<li>${v.description} - ${v.credit} JD</li>`;
  });

});
</script>

</body>
</html>
