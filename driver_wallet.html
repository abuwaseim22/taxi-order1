<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>محفظة السائق</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
}

.container{
  max-width:420px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

.boxes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:15px;
}

.box{
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

h1,h2{text-align:center;}

.transaction{
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 محفظة السائق</h2>

<div class="boxes">
  <div class="box">
    <h3 id="balance">0</h3>
    <small>الرصيد</small>
  </div>

  <div class="box">
    <h3 id="earned">0</h3>
    <small>إجمالي الأرباح</small>
  </div>

  <div class="box">
    <h3 id="commission">0</h3>
    <small>إجمالي العمولة</small>
  </div>
</div>

<h3>📋 العمليات</h3>
<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);

const driverId = "driver123";

const balanceEl = document.getElementById("balance");
const earnedEl = document.getElementById("earned");
const commissionEl = document.getElementById("commission");
const listEl = document.getElementById("list");

// 🔥 قراءة المحفظة
firebase.database()
.ref("wallets/drivers/"+driverId)
.on("value", snap => {

  let d = snap.val();

  // 👇 حماية كاملة من null
  if(!d){
    d = {
      balance: 0,
      totalEarned: 0,
      totalCommission: 0,
      transactions: {}
    };
  }

  balanceEl.innerText = Number(d.balance || 0).toFixed(2) + " JD";
  earnedEl.innerText = Number(d.totalEarned || 0).toFixed(2) + " JD";
  commissionEl.innerText = Number(d.totalCommission || 0).toFixed(2) + " JD";

  listEl.innerHTML = "";

  let tx = d.transactions || {};

  Object.entries(tx)
  .sort((a,b)=>b[0]-a[0])
  .forEach(([k,v])=>{

    listEl.innerHTML += `
      <div class="transaction">
        <b>${v.description || "رحلة"}</b><br>
        💰 إجمالي: ${v.total || 0} JD<br>
        ➖ عمولة: ${v.commission || 0} JD<br>
        ✅ صافي: ${v.earned || 0} JD<br>
        🕒 ${v.date || ""}
      </div>
    `;
  });
});
</script>

</body>
</html>
