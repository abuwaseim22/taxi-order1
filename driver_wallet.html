<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المحفظة</title>
</head>

<body>

<h2>محفظة السائق 💰</h2>
<h1 id="bal">0 JD</h1>
<ul id="list"></ul>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);

const driverId = "driver123";

firebase.database().ref("wallets/drivers/"+driverId)
.on("value", snap=>{

  let d = snap.val() || {balance:0, transactions:{}};

  bal.innerText = d.balance + " JD";

  list.innerHTML = "";

  Object.entries(d.transactions || {})
  .reverse()
  .forEach(([k,v])=>{
    list.innerHTML += `
      <li>${v.description} - ${v.credit} JD</li>
    `;
  });
});
</script>

</body>
</html>
