<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلب تاكسي</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:10px; margin-top:10px; }
</style>
</head>

<body>

<h2>طلب سيارة 🚕</h2>

<div class="card">

<input id="name" placeholder="اسمك">

<select id="from">
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<select id="to">
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<input id="passengers" type="number" placeholder="عدد الركاب">

<button onclick="sendOrder()">إرسال الطلب</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔥 دالة السعر (المعدلة فقط)
function priceCalc(from, to, passengers){

  // 🚫 منع نفس المنطقة
  if(from === to){
    alert("❌ لا يمكن اختيار نفس المنطقة");
    return 0;
  }

  let price = 0;

  // 🟢 عمان ↔ أي منطقة
  if(
    (from === "عمان" && to !== "عمان") ||
    (to === "عمان" && from !== "عمان")
  ){
    price = 5;
  }

  // 🔵 اربد ↔ الزرقاء
  else if(
    (from === "اربد" && to === "الزرقاء") ||
    (from === "الزرقاء" && to === "اربد")
  ){
    price = 4;
  }

  // 🟡 اربد ↔ المفرق
  else if(
    (from === "اربد" && to === "المفرق") ||
    (from === "المفرق" && to === "اربد")
  ){
    price = 3;
  }

  // 🔴 المفرق ↔ الزرقاء
  else if(
    (from === "المفرق" && to === "الزرقاء") ||
    (from === "الزرقاء" && to === "المفرق")
  ){
    price = 2.5;
  }

  // ❌ غير مدعوم
  else{
    alert("❌ هذا المسار غير مدعوم");
    return 0;
  }

  return price * passengers;
}


// 🚕 إرسال الطلب
function sendOrder(){

  let name = document.getElementById("name").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let passengers = Number(document.getElementById("passengers").value);

  if(!name || !passengers){
    alert("عبّي البيانات ❌");
    return;
  }

  let price = priceCalc(from, to, passengers);

  // 🚫 إذا في مشكلة
  if(price === 0){
    return;
  }

  let id = "order" + Date.now();

  db.ref("orders/"+id).set({
    customer_name: name,
    pickup_location: from,
    dropoff_location: to,
    passenger_count: passengers,
    price: price,
    status: "sent",
    driver_id: null
  });

  alert("تم إرسال الطلب 🚕");
}

</script>

</body>
</html>
