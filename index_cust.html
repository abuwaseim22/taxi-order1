<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلب تاكسي</title>

<!-- 🌍 خريطة -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* 📦 الكارد */
.card{
  background:white;
  color:black;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

/* 🎯 inputs */
input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* 🔘 زر */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

/* 🌍 الخريطة */
#map{
  height:250px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2 style="text-align:center">🚕 اطلب سيارة</h2>

<div class="card">

<input id="name" placeholder="اسمك">

<select id="from">
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<select id="to">
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<input id="passengers" type="number" placeholder="عدد الركاب">

<!-- 💰 السعر -->
<p>💰 السعر: <span id="price">0</span> JD</p>

<button onclick="sendOrder()">إرسال الطلب</button>

<!-- 🌍 خريطة -->
<div id="map"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🚫 حماية بسيطة */
if(!localStorage.getItem("customer")){
  // لو بدك تسجيل لاحقاً
  console.log("guest mode");
}

/* 🌍 خريطة */
let map = L.map('map').setView([31.9632, 35.9306], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

/* 💰 حساب السعر */
function priceCalc(from, to, passengers){

  if(from === to){
    alert("❌ نفس المنطقة غير مسموح");
    return 0;
  }

  let price = 0;

  if(
    (from === "عمان" && to !== "عمان") ||
    (to === "عمان" && from !== "عمان")
  ){
    price = 5;
  }

  else if(
    (from === "اربد" && to === "الزرقاء") ||
    (from === "الزرقاء" && to === "اربد")
  ){
    price = 4;
  }

  else if(
    (from === "اربد" && to === "المفرق") ||
    (from === "المفرق" && to === "اربد")
  ){
    price = 3;
  }

  else if(
    (from === "المفرق" && to === "الزرقاء") ||
    (from === "الزرقاء" && to === "المفرق")
  ){
    price = 2.5;
  }

  else{
    alert("❌ هذا المسار غير مدعوم");
    return 0;
  }

  return price * passengers;
}

/* 🔄 تحديث السعر لحظي */
document.getElementById("from").onchange =
document.getElementById("to").onchange =
document.getElementById("passengers").oninput = function(){

  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let p = Number(document.getElementById("passengers").value || 1);

  let price = priceCalc(from,to,p);

  document.getElementById("price").innerText = price;
};

/* 🚕 إرسال الطلب */
function sendOrder(){

  let name = document.getElementById("name").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let passengers = Number(document.getElementById("passengers").value);

  let price = priceCalc(from,to,passengers);

  if(price === 0 || !name){
    return;
  }

  let id = "order" + Date.now();

  db.ref("orders/"+id).set({
    customer_name: name,
    pickup_location: from,
    dropoff_location: to,
    passenger_count: passengers,
    price: price,
    status: "sent",
    driver_id: null
  });

  alert("تم إرسال الطلب 🚕");
}

</script>

</body>
</html>
