<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلب تاكسي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family: Arial;
}

/* 🌍 الخريطة خلفية كاملة */
#map{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* 📦 الواجهة فوق الخريطة */
.ui{
  position: relative;
  z-index:1;
  padding:15px;
}

/* 🎨 الكارد */
.card{
  background: rgba(255,255,255,0.92);
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  max-width:400px;
  margin:auto;
}

/* inputs */
input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* زر */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* 💰 السعر */
.price{
  font-weight:bold;
  text-align:center;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- 🌍 الخريطة -->
<div id="map"></div>

<!-- UI -->
<div class="ui">

<div class="card">

<h3 style="text-align:center">🚕 اطلب سيارة</h3>

<input id="name" placeholder="اسمك">

<select id="from">
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<select id="to">
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<input id="passengers" type="number" value="1" placeholder="عدد الركاب">

<div class="price">💰 السعر: <span id="price">0</span> JD</div>

<button onclick="sendOrder()">إرسال الطلب 🚕</button>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🌍 خريطة خلفية */
let map = L.map('map').setView([31.9632, 35.9306], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);


/* 💰 السعر */
function priceCalc(from, to, passengers){

  from = from.trim();
  to = to.trim();

  if(from === to){
    alert("❌ نفس المنطقة غير مسموح");
    return 0;
  }

  let price = 0;

  if(
    (from === "عمان" && to !== "عمان") ||
    (to === "عمان" && from !== "عمان")
  ){
    price = 5;
  }

  else if(
    (from === "اربد" && to === "الزرقاء") ||
    (from === "الزرقاء" && to === "اربد")
  ){
    price = 4;
  }

  else if(
    (from === "اربد" && to === "المفرق") ||
    (from === "المفرق" && to === "اربد")
  ){
    price = 3;
  }

  else if(
    (from === "المفرق" && to === "الزرقاء") ||
    (from === "الزرقاء" && to === "المفرق")
  ){
    price = 2.5;
  }

  else{
    alert("❌ هذا المسار غير مدعوم");
    return 0;
  }

  return price * passengers;
}


/* 🔄 تحديث السعر */
function updatePrice(){

  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let p = Number(document.getElementById("passengers").value || 1);

  let price = priceCalc(from,to,p);

  document.getElementById("price").innerText = price;
}

document.getElementById("from").onchange =
document.getElementById("to").onchange =
document.getElementById("passengers").oninput = updatePrice;


/* 🚕 إرسال الطلب */
function sendOrder(){

  let name = document.getElementById("name").value.trim();
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let passengers = Number(document.getElementById("passengers").value || 1);

  let price = priceCalc(from,to,passengers);

  if(!name || price === 0){
    return;
  }

  let id = "order" + Date.now();

  db.ref("orders/"+id).set({
    customer_name: name,
    pickup_location: from,
    dropoff_location: to,
    passenger_count: passengers,
    price: price,
    status: "sent",
    driver_id: null
  });

  alert("تم إرسال الطلب 🚕");
}

</script>

</body>
</html>
