<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>طلب سيارة</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* 🗺️ الخريطة */
#map{
  height:100vh;
  width:100%;
}

/* 📦 الفورم */
.box{
  position:fixed;
  bottom:10px;
  left:10px;
  background:white;
  padding:12px;
  border-radius:15px;
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999;
}

/* ✍️ inputs */
input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}

/* 🔘 زر */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:15px;
  margin-top:5px;
}

#price{
  text-align:center;
  font-weight:bold;
  font-size:18px;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="box">

<div style="font-weight:bold;">🟢 الانطلاق</div>
<select id="from">
  <option value="">من</option>
  <option>عمان</option>
  <option>إربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<div style="font-weight:bold;">🔴 الوصول</div>
<select id="to">
  <option value="">إلى</option>
  <option>عمان</option>
  <option>إربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<!-- 📍 العناوين التفصيلية -->
<input id="pickupDetail" placeholder="عنوان الانطلاق التفصيلي" readonly>
<input id="dropDetail" placeholder="عنوان الوصول التفصيلي" readonly>

<input id="passengers" type="number" placeholder="عدد الركاب">

<input id="date" type="date">
<input id="time" type="time">

<div id="price">0 JD</div>

<button onclick="send()">تأكيد الحجز</button>

<p id="msg"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let pickupLat, pickupLng, dropLat, dropLng;
let totalPrice = 0;

/* 🧠 العنوان */
function getAddress(lat,lng,cb){
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
  .then(r=>r.json())
  .then(d=>cb(d.display_name));
}
</script>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([31.95,35.93], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

/* 🎯 ماركرات */
const pickupIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/green-dot.png",
  iconSize:[32,32]
});

const dropIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
  iconSize:[32,32]
});

let pickupMarker = L.marker([31.95,35.93],{draggable:true,icon:pickupIcon}).addTo(map);
let dropMarker = L.marker([31.97,35.95],{draggable:true,icon:dropIcon}).addTo(map);

/* 📍 تحديث */
function updatePickup(){
  let p = pickupMarker.getLatLng();
  pickupLat = p.lat;
  pickupLng = p.lng;

  getAddress(p.lat,p.lng,(addr)=>{
    pickupDetail.value = addr;
  });

  calc();
}

function updateDrop(){
  let d = dropMarker.getLatLng();
  dropLat = d.lat;
  dropLng = d.lng;

  getAddress(d.lat,d.lng,(addr)=>{
    dropDetail.value = addr;
  });

  calc();
}

pickupMarker.on("dragend", updatePickup);
dropMarker.on("dragend", updateDrop);

updatePickup();
updateDrop();

/* 💰 السعر */
function calc(){

  let fromVal = from.value;
  let toVal = to.value;

  let p = Number(passengers.value);

  if(p > 3) p = 3;
  if(p < 1) p = 1;

  let basePrice = 0;

  if((fromVal==="إربد"&&toVal==="الزرقاء")||(fromVal==="الزرقاء"&&toVal==="إربد")){
    basePrice = 4;
  }
  else if((fromVal==="إربد"&&toVal==="المفرق")||(fromVal==="المفرق"&&toVal==="إربد")){
    basePrice = 3;
  }
  else if((fromVal==="المفرق"&&toVal==="الزرقاء")||(fromVal==="الزرقاء"&&toVal==="المفرق")){
    basePrice = 2.5;
  }
  else if(fromVal && toVal && fromVal !== toVal){
    basePrice = 5;
  }
  else{
    price.innerText = "0 JD";
    return;
  }

  totalPrice = basePrice * p;

  price.innerText = totalPrice + " JD";
}

from.onchange = calc;
to.onchange = calc;
passengers.oninput = calc;

/* 🚕 إرسال */
function send(){

  if(!from.value || !to.value){
    msg.innerText="❌ عبّي البيانات";
    return;
  }

  let p = Number(passengers.value);
  if(p > 3) p = 3;
  if(p < 1) p = 1;

  db.ref("orders").push({
    pickup_location: from.value,
    dropoff_location: to.value,

    pickup_lat: pickupLat,
    pickup_lng: pickupLng,
    pickup_address: pickupDetail.value,

    drop_lat: dropLat,
    drop_lng: dropLng,
    drop_address: dropDetail.value,

    passengers: p,
    date: date.value,
    time: time.value,

    price: totalPrice,
    status:"sent",
    customer_name:"زبون"
  });

  msg.innerText="✅ تم الحجز";
}
</script>

</body>
</html>
