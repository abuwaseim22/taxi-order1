<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Taxi App - حجز + خريطة</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  padding:20px;
  background:#f0f4f8;
}
select, input {
  padding:10px;
  margin:10px auto;
  width: 90%;
  max-width: 350px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing: border-box;
  display: block;
}
button {
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  width: 80%;
  max-width: 200px;
  margin: 10px auto;
  display: block;
}
#price {
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}
#map {
  width: 90%;
  height: 300px;
  margin: 20px auto;
  border: 1px solid #ccc;
  border-radius: 10px;
}
.hidden { display:none; }
</style>
</head>
<body>

<h2>طلب تاكسي + خريطة 🚕</h2>

<!-- صفحة الحجز -->
<div id="bookingSection">
  <select id="from">
    <option value="">من أين؟</option>
    <option value="عمان">عمان</option>
    <option value="اربد">اربد</option>
    <option value="الزرقاء">الزرقاء</option>
    <option value="المفرق">المفرق</option>
  </select>

  <select id="to">
    <option value="">إلى أين؟</option>
    <option value="عمان">عمان</option>
    <option value="اربد">اربد</option>
    <option value="الزرقاء">الزرقاء</option>
    <option value="المفرق">المفرق</option>
  </select>

  <input id="name" type="text" placeholder="الاسم">
  <input id="passengers" type="number" placeholder="عدد الركاب">

  <input id="date" type="date" placeholder="اختر التاريخ">
  <input id="time" type="time" placeholder="اختر الوقت">

  <div id="price">السعر: 0 دينار</div>

  <div id="map"></div>

  <input id="startAddress" type="text" placeholder="عنوان الانطلاق التفصيلي" readonly>
  <input id="endAddress" type="text" placeholder="عنوان الوصول التفصيلي" readonly>

  <button id="bookRideBtn">طلب</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 🔑 إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// عناصر الصفحة
const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");
const nameInput = document.getElementById("name");
const passengersInput = document.getElementById("passengers");
const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");
const priceLabel = document.getElementById("price");
const bookRideBtn = document.getElementById("bookRideBtn");

const startAddressInput = document.getElementById("startAddress");
const endAddressInput = document.getElementById("endAddress");

// --- السعر ---
function getPrice(from, to){
  if ((from==="عمان"&&to==="اربد")||(from==="اربد"&&to==="عمان")) return 5;
  if ((from==="عمان"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="عمان")) return 2.5;
  if ((from==="عمان"&&to==="المفرق")||(from==="المفرق"&&to==="عمان")) return 3;
  if ((from==="اربد"&&to==="المفرق")||(from==="المفرق"&&to==="اربد")) return 2.5;
  if ((from==="اربد"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="اربد")) return 3;
  if ((from==="المفرق"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="المفرق")) return 2.5;
  return 0;
}

function updatePrice(){
  let base = getPrice(fromInput.value, toInput.value);
  let p = Number(passengersInput.value) || 1;
  let total = base * p;
  priceLabel.innerText = "السعر: " + total + " دينار";
}

fromInput.addEventListener("change", updatePrice);
toInput.addEventListener("change", updatePrice);
passengersInput.addEventListener("input", updatePrice);

// --- Google Maps ---
let map, geocoder, startMarker, endMarker;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: {lat: 31.95, lng: 35.93}, // الأردن تقريبًا
    zoom: 7
  });
  geocoder = new google.maps.Geocoder();

  // إضافة ماركر عند الضغط
  map.addListener("click", (e) => {
    if(!startMarker){
      startMarker = new google.maps.Marker({position: e.latLng, map: map, label:"A"});
      geocoder.geocode({location: e.latLng}, (results, status) => {
        if(status === "OK" && results[0]){
          startAddressInput.value = results[0].formatted_address;
        }
      });
    } else if(!endMarker){
      endMarker = new google.maps.Marker({position: e.latLng, map: map, label:"B"});
      geocoder.geocode({location: e.latLng}, (results, status) => {
        if(status === "OK" && results[0]){
          endAddressInput.value = results[0].formatted_address;
        }
      });
    } else {
      alert("تم وضع ماركر البداية والنهاية بالفعل");
    }
  });
}

// --- الحجز ---
bookRideBtn.addEventListener("click", () => {
  let from = fromInput.value;
  let to = toInput.value;
  let name = nameInput.value;
  let passengers = Number(passengersInput.value);
  let date = dateInput.value;
  let time = timeInput.value;
  let startAddress = startAddressInput.value;
  let endAddress = endAddressInput.value;

  if(!from || !to || !name || !passengers || !date || !time || !startAddress || !endAddress){
    return alert("عبّي كل الحقول");
  }

  let base = getPrice(from, to);
  if(base === 0) return alert("المسار غير مدعوم");

  let total = base * passengers;

  db.ref("orders/order" + Date.now()).set({
    pickup_location: from,
    dropoff_location: to,
    passenger_count: passengers,
    pickup_date: date,
    pickup_time: time,
    customer_name: name,
    start_address: startAddress,
    end_address: endAddress,
    price: total,
    status: "new"
  });

  alert("تم الحجز 🚕\nالسعر: " + total + " دينار");
  priceLabel.innerText = "السعر: " + total + " دينار";
});
</script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBFg3BmVVyYR4fVrnac-Je1m150ACQz-G0&callback=initMap" async defer></script>

</body>
</html>
