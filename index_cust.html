<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الزبون</title>

<style>
html, body { height:100%; margin:0; font-family: Arial; }
#map { position:absolute; top:0; left:0; width:100%; height:100%; }

#form {
  position:absolute;
  top:20px;
  left:20px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:320px;
  z-index:2;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="form">
<h3>طلب تاكسي 🚕</h3>

<select id="from">
  <option value="">من</option>
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<select id="to">
  <option value="">إلى</option>
  <option>عمان</option>
  <option>اربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<input id="name" placeholder="الاسم">
<input id="passengers" type="number" placeholder="عدد الركاب">

<div id="price">السعر: 0</div>

<button id="send">طلب</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// السعر
function priceCalc(from,to,p){

  if((from==="عمان"&&to==="اربد")||(from==="اربد"&&to==="عمان")) return 5*p;
  if((from==="عمان"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="عمان")) return 2.5*p;
  if((from==="عمان"&&to==="المفرق")||(from==="المفرق"&&to==="عمان")) return 3*p;

  return 0;
}

// تحديث السعر
function updatePrice(){
  let from = from.value;
  let to = to.value;
  let p = Number(passengers.value || 1);

  if(p >= 3) p = 3;

  price.innerText = "السعر: " + priceCalc(from,to,p);
}

from.onchange = updatePrice;
to.onchange = updatePrice;
passengers.oninput = updatePrice;

// إرسال الطلب
send.onclick = () => {

  let p = Number(passengers.value || 1);
  if(p >= 3) p = 3;

  let id = "order"+Date.now();

  db.ref("orders/"+id).set({
    pickup_location: from.value,
    dropoff_location: to.value,
    customer_name: name.value,
    passenger_count: p,
    price: priceCalc(from.value,to.value,p),
    status: "sent"
  });

  alert("تم إرسال الطلب 🚕");
};
</script>

</body>
</html>
