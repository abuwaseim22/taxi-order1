<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تطبيق الزبون</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #f0f4f8, #d9e2ec);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  color: #1f2937;
  margin-bottom: 20px;
}

.input-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 15px;
  width: 300px;
}

.input-group label {
  margin-bottom: 5px;
  font-weight: bold;
  color: #111827;
}

.input-group input {
  padding: 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 16px;
}

#Label_Price {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #0f172a;
}

#Button_Book {
  padding: 12px 20px;
  font-size: 18px;
  background-color: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#Button_Book:hover {
  background-color: #1d4ed8;
}
</style>
</head>
<body>

<h1>طلب تاكسي</h1>

<div class="input-group">
  <label for="Text_Input_From">من أين؟</label>
  <input type="text" id="Text_Input_From" placeholder="ادخل مكان الانطلاق">
</div>

<div class="input-group">
  <label for="Text_Input_To">إلى أين؟</label>
  <input type="text" id="Text_Input_To" placeholder="ادخل الوجهة">
</div>

<div id="Label_Price">السعر: 0 دينار</div>

<button id="Button_Book">طلب 🚕</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const priceLabel = document.getElementById("Label_Price");
const fromInput = document.getElementById("Text_Input_From");
const toInput = document.getElementById("Text_Input_To");

function calculatePrice() {
  let price = 5; // مثال ثابت
  priceLabel.textContent = "السعر: " + price + " دينار";
}

fromInput.addEventListener("input", calculatePrice);
toInput.addEventListener("input", calculatePrice);

document.getElementById("Button_Book").addEventListener("click", () => {
  const orderId = "order" + Date.now();
  db.ref("orders/" + orderId).set({
    pickup_location: fromInput.value,
    dropoff_location: toInput.value,
    price: 5,
    status: "new",
    pickup_date: "",
    pickup_time: "",
    dropoff_date: "",
    dropoff_time: "",
    passenger_count: "",
    customer_name: "",
    customer_phone: "",
    driver_name: "",
    driver_phone: "",
    car_type: "",
    car_number: ""
  });
  alert("تم إرسال الطلب 🚕");
  fromInput.value = "";
  toInput.value = "";
  calculatePrice();
});
</script>

</body>
</html>
