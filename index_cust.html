<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>طلب سيارة</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* 🗺️ خريطة */
#map{
  height:100vh;
  width:100%;
}

/* 📍 صندوق العنوان */
#addressBox{
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  padding:12px;
  border-radius:12px;
  width:260px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
  z-index:9999;
  font-size:13px;
}

/* 📦 الفورم */
.box{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:20px;
  border-radius:15px;
  width:95%;
  max-width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999;
}

/* 🔥 تكبير */
input, select{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:17px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:17px;
  margin-top:5px;
}

#price{
  font-size:20px;
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="addressBox">
  <div id="pickupText">📍 جاري التحميل...</div>
  <div id="dropText">🏁 جاري التحميل...</div>
</div>

<div class="box">

<select id="from">
  <option value="">من</option>
  <option>عمان</option>
  <option>إربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<select id="to">
  <option value="">إلى</option>
  <option>عمان</option>
  <option>إربد</option>
  <option>الزرقاء</option>
  <option>المفرق</option>
</select>

<input id="pickupDetail" placeholder="📍 العنوان التفصيلي" readonly>
<input id="dropDetail" placeholder="🏁 العنوان التفصيلي" readonly>

<input id="passengers" type="number" placeholder="عدد الركاب (1-3)" min="1" max="3">

<input id="date" type="date">
<input id="time" type="time">

<button onclick="calc()">احسب السعر</button>

<div id="price">0 JD</div>

<button onclick="send()">تأكيد الحجز</button>

<p id="msg"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let pickupLat, pickupLng, dropLat, dropLng;
let totalPrice = 0;

/* 🧠 جلب العنوان */
function getAddress(lat,lng,cb){
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
  .then(r=>r.json())
  .then(d=>cb(d.display_name));
}
</script>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([31.95,35.93], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

/* أيقونات */
const pickupIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/green-dot.png",
  iconSize:[32,32]
});

const dropIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
  iconSize:[32,32]
});

/* ماركر */
let pickupMarker = L.marker([31.95,35.93],{draggable:true,icon:pickupIcon}).addTo(map);
let dropMarker = L.marker([31.97,35.95],{draggable:true,icon:dropIcon}).addTo(map);

/* تحديث */
function updatePickup(){
  let p = pickupMarker.getLatLng();
  pickupLat = p.lat;
  pickupLng = p.lng;

  getAddress(p.lat,p.lng,(addr)=>{
    pickupDetail.value = addr;
    pickupText.innerText = "📍 " + addr;
  });
}

function updateDrop(){
  let d = dropMarker.getLatLng();
  dropLat = d.lat;
  dropLng = d.lng;

  getAddress(d.lat,d.lng,(addr)=>{
    dropDetail.value = addr;
    dropText.innerText = "🏁 " + addr;
  });
}

updatePickup();
updateDrop();

pickupMarker.on("dragend", updatePickup);
dropMarker.on("dragend", updateDrop);

/* 💰 السعر */
function calc(){

  let from = from.value;
  let to = to.value;
  let p = Number(passengers.value);

  if(from === to){
    alert("❌ لا يمكن نفس المنطقة");
    return;
  }

  if(p < 1 || p > 3){
    alert("❌ الحد الأقصى 3");
    return;
  }

  if((from==="إربد"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="إربد")){
    totalPrice = 4 * p;
  }
  else if((from==="إربد"&&to==="المفرق")||(from==="المفرق"&&to==="إربد")){
    totalPrice = 3 * p;
  }
  else if((from==="المفرق"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="المفرق")){
    totalPrice = 2.5 * p;
  }
  else{
    totalPrice = 5 * p;
  }

  price.innerText = totalPrice + " JD";
}

/* 🚕 إرسال */
function send(){

  if(!from.value || !to.value || !passengers.value || !date.value || !time.value){
    msg.innerText="❌ عبّي كل البيانات";
    return;
  }

  db.ref("orders").push({
    pickup_location: from.value,
    dropoff_location: to.value,

    pickup_lat: pickupLat,
    pickup_lng: pickupLng,
    pickup_address: pickupDetail.value,

    drop_lat: dropLat,
    drop_lng: dropLng,
    drop_address: dropDetail.value,

    passengers: passengers.value,
    date: date.value,
    time: time.value,

    price: totalPrice,
    status:"sent",
    customer_name:"زبون"
  });

  msg.innerText="✅ تم الحجز";
}
</script>

</body>
</html>
