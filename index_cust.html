<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Taxi App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  overflow:hidden;
}

#map {
  position:fixed;
  width:100%;
  height:100%;
}

#panel {
  position:fixed;
  bottom:0;
  width:100%;
  height:40%;
  background:white;
  border-radius:20px 20px 0 0;
  padding:12px;
  overflow-y:auto;
}

input, select {
  width:95%;
  padding:12px;
  margin:8px auto;
  display:block;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  width:90%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

#price {
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

<select id="from">
  <option value="">من أين؟</option>
  <option value="عمان">عمان</option>
  <option value="اربد">اربد</option>
  <option value="الزرقاء">الزرقاء</option>
  <option value="المفرق">المفرق</option>
</select>

<select id="to">
  <option value="">إلى أين؟</option>
  <option value="عمان">عمان</option>
  <option value="اربد">اربد</option>
  <option value="الزرقاء">الزرقاء</option>
  <option value="المفرق">المفرق</option>
</select>

<input id="name" placeholder="الاسم">
<input id="passengers" type="number" placeholder="عدد الركاب">
<input id="date" type="date">
<input id="time" type="time">

<div id="price">السعر: 0</div>

<input id="startAddress" placeholder="عنوان الانطلاق" readonly>
<input id="endAddress" placeholder="عنوان الوصول" readonly>

<button id="book">اطلب 🚕</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// السعر
function getPrice(from, to){
  if ((from==="عمان"&&to==="اربد")||(from==="اربد"&&to==="عمان")) return 5;
  if ((from==="عمان"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="عمان")) return 2.5;
  if ((from==="عمان"&&to==="المفرق")||(from==="المفرق"&&to==="عمان")) return 3;
  if ((from==="اربد"&&to==="المفرق")||(from==="المفرق"&&to==="اربد")) return 2.5;
  if ((from==="اربد"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="اربد")) return 3;
  if ((from==="المفرق"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="المفرق")) return 2.5;
  return 0;
}

function updatePrice(){
  let p = Number(passengers.value) || 1;
  let total = getPrice(from.value,to.value) * p;
  document.getElementById("price").innerText = "السعر: " + total;
}

from.onchange = updatePrice;
to.onchange = updatePrice;
passengers.oninput = updatePrice;

// تحديد المدينة
function detectCity(address){
  if(address.includes("Amman")) return "عمان";
  if(address.includes("Irbid")) return "اربد";
  if(address.includes("Zarqa")) return "الزرقاء";
  if(address.includes("Mafraq")) return "المفرق";
  return "";
}

// الخريطة
let map, startMarker, endMarker, geocoder;

function initMap(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:31.95,lng:35.93},
    zoom:7
  });

  geocoder = new google.maps.Geocoder();

  map.addListener("click",(e)=>{
    if(!startMarker){
      startMarker = new google.maps.Marker({position:e.latLng,map});
      geocoder.geocode({location:e.latLng},(results,status)=>{
        if(status==="OK" && results[0]){
          let addr = results[0].formatted_address;
          document.getElementById("startAddress").value = addr;

          let city = detectCity(addr);
          if(city) from.value = city;

          updatePrice();
        }
      });
    } else if(!endMarker){
      endMarker = new google.maps.Marker({position:e.latLng,map});
      geocoder.geocode({location:e.latLng},(results,status)=>{
        if(status==="OK" && results[0]){
          let addr = results[0].formatted_address;
          document.getElementById("endAddress").value = addr;

          let city = detectCity(addr);
          if(city) to.value = city;

          updatePrice();
        }
      });
    }
  });
}

// الحجز
document.getElementById("book").onclick = ()=>{
  let total = getPrice(from.value,to.value) * (Number(passengers.value)||1);

  db.ref("orders/"+Date.now()).set({
    pickup_location: from.value,
    dropoff_location: to.value,
    start_address: startAddress.value,
    end_address: endAddress.value,
    passenger_count: passengers.value,
    pickup_date: date.value,
    pickup_time: time.value,
    customer_name: name.value,
    price: total,
    status: "new"
  });

  alert("تم الحجز 🚕");
};
</script>

<!-- 🔥 أهم سطر -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBFg3BmVVyYR4fVrnac-Je1m150ACQz-G0&callback=initMap" async defer></script>

</body>
</html>
