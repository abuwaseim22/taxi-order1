<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تطبيق الزبون - المبدع v2</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  background:#f0f4f8;
}

input, select, button {
  width: 100%;
  max-width: 350px;
  padding:12px;
  margin:10px auto;
  display:block;
  font-size:18px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

#price {
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>
<body>

<h2>طلب تاكسي 🚕</h2>

<input id="name" type="text" placeholder="الاسم">
<input id="phone" type="tel" placeholder="رقم الهاتف">

<select id="from">
  <option value="">من أين؟</option>
  <option value="عمان">عمان</option>
  <option value="اربد">اربد</option>
  <option value="الزرقاء">الزرقاء</option>
  <option value="المفرق">المفرق</option>
</select>

<select id="to">
  <option value="">إلى أين؟</option>
  <option value="عمان">عمان</option>
  <option value="اربد">اربد</option>
  <option value="الزرقاء">الزرقاء</option>
  <option value="المفرق">المفرق</option>
</select>

<input id="passengers" type="number" placeholder="عدد الركاب">
<input id="date" type="date">
<input id="time" type="time">

<div id="price">السعر: 0 دينار</div>
<button id="bookRideBtn">طلب 🚕</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");
const passengersInput = document.getElementById("passengers");
const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");
const priceLabel = document.getElementById("price");
const bookBtn = document.getElementById("bookRideBtn");

function getPrice(from, to){
  if ((from==="عمان"&&to==="اربد")||(from==="اربد"&&to==="عمان")) return 5;
  if ((from==="عمان"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="عمان")) return 2.5;
  if ((from==="عمان"&&to==="المفرق")||(from==="المفرق"&&to==="عمان")) return 3;
  if ((from==="اربد"&&to==="المفرق")||(from==="المفرق"&&to==="اربد")) return 2.5;
  if ((from==="اربد"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="اربد")) return 3;
  if ((from==="المفرق"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="المفرق")) return 2.5;
  return 0;
}

function updatePrice(){
  const p = Number(passengersInput.value) || 1;
  const total = getPrice(fromInput.value, toInput.value) * p;
  priceLabel.innerText = "السعر: " + total + " دينار";
}

fromInput.addEventListener("change", updatePrice);
toInput.addEventListener("change", updatePrice);
passengersInput.addEventListener("input", updatePrice);

bookBtn.addEventListener("click", ()=>{
  const name = nameInput.value;
  const phone = phoneInput.value;
  const from = fromInput.value;
  const to = toInput.value;
  const passengers = Number(passengersInput.value);
  const date = dateInput.value;
  const time = timeInput.value;

  if(!name||!phone||!from||!to||!passengers||!date||!time){
    return alert("أكمل كل الحقول");
  }

  const total = getPrice(from,to) * passengers;
  if(total===0) return alert("المسار غير مدعوم");

  db.ref("orders/order" + Date.now()).set({
    customer_name: name,
    customer_phone: phone,
    pickup_location: from,
    dropoff_location: to,
    passenger_count: passengers,
    pickup_date: date,
    pickup_time: time,
    price: total,
    status: "new"
  }).then(()=> alert("تم الحجز 🚕\nالسعر: " + total + " دينار"))
    .catch(e => alert("فشل الإرسال: "+e.message));
});
</script>

</body>
</html>
