<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Taxi App</title>

<style>
body { font-family: Arial; text-align: center; padding:20px; }
select, input { padding:10px; margin:10px; width:250px; }
button { padding:12px; background:blue; color:white; border:none; }
</style>

</head>
<body>

<h2>طلب تاكسي</h2>

<select id="from">
  <option value="">من أين؟</option>
  <option value="عمان">عمان</option>
  <option value="اربد">اربد</option>
  <option value="الزرقاء">الزرقاء</option>
  <option value="المفرق">المفرق</option>
</select><br>

<select id="to">
  <option value="">إلى أين؟</option>
  <option value="عمان">عمان</option>
  <option value="اربد">اربد</option>
  <option value="الزرقاء">الزرقاء</option>
  <option value="المفرق">المفرق</option>
</select><br>

<input id="passengers" type="number" placeholder="عدد الركاب"><br>

<div id="price">السعر: 0</div>

<button onclick="bookRide()">طلب</button>

<script>
const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");
const passengersInput = document.getElementById("passengers");
const priceLabel = document.getElementById("price");

function getPrice(from, to){
  if ((from==="عمان"&&to==="اربد")||(from==="اربد"&&to==="عمان")) return 5;
  if ((from==="عمان"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="عمان")) return 2.5;
  if ((from==="عمان"&&to==="المفرق")||(from==="المفرق"&&to==="عمان")) return 3;
  if ((from==="اربد"&&to==="المفرق")||(from==="المفرق"&&to==="اربد")) return 2.5;
  if ((from==="اربد"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="اربد")) return 3;
  if ((from==="المفرق"&&to==="الزرقاء")||(from==="الزرقاء"&&to==="المفرق")) return 2.5;
  return 0;
}

function updatePrice(){
  let base = getPrice(fromInput.value, toInput.value);
  let p = Number(passengersInput.value)||1;
  priceLabel.innerText = "السعر: " + (base*p);
}

fromInput.addEventListener("change", updatePrice);
toInput.addEventListener("change", updatePrice);
passengersInput.addEventListener("input", updatePrice);

function bookRide(){
  alert("الزر شغال ✅");
}
</script>

</body>
</html>
