<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الأرباح التفصيلية</title>

<style>
body{
  font-family: Arial;
  background:#f1f5f9;
  margin:0;
}

h2{
  text-align:center;
  padding:10px;
}

/* 🔵 Stats */
.top{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.card{
  flex:1;
  min-width:150px;
  background:#16a34a;
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* 🧾 Table */
.driver{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<h2>💰 الأرباح التفصيلية</h2>

<!-- 🔵 Stats -->
<div class="top">
  <div class="card">
    <h3 id="totalEarned">0</h3>
    <p>إجمالي أرباح السائقين</p>
  </div>

  <div class="card">
    <h3 id="totalCommission">0</h3>
    <p>إجمالي عمولة الشركة</p>
  </div>

  <div class="card">
    <h3 id="totalTrips">0</h3>
    <p>عدد الرحلات</p>
  </div>
</div>

<!-- 🧾 Drivers -->
<div id="drivers"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const div = document.getElementById("drivers");

let totalEarnedAll = 0;
let totalCommissionAll = 0;
let tripsCount = 0;

// 🔥 Drivers profit
db.ref("drivers").on("value", snap=>{

  div.innerHTML = "";

  totalEarnedAll = 0;
  totalCommissionAll = 0;
  tripsCount = 0;

  snap.forEach(d=>{

    let data = d.val();

    totalEarnedAll += Number(data.totalEarned || 0);
    totalCommissionAll += Number(data.totalCommission || 0);

    div.innerHTML += `
      <div class="driver">
        <h3>${data.name}</h3>
        <p>💰 أرباح السائق: ${data.totalEarned || 0}</p>
        <p>🏦 عمولة الشركة: ${data.totalCommission || 0}</p>
        <p>⚡ الرصيد الحالي: ${data.balance}</p>
      </div>
    `;
  });

  totalEarned.innerText = totalEarnedAll.toFixed(2);
  totalCommission.innerText = totalCommissionAll.toFixed(2);

});


// 🔥 Count trips
db.ref("orders").on("value", snap=>{
  tripsCount = snap.numChildren();
  totalTrips.innerText = tripsCount;
});

</script>

</body>
</html>
