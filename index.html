<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات السائق</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  background: #f0f4f8;
  padding: 20px;
}
.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
button {
  padding: 8px 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>

</head>
<body>

<h2>طلبات التاكسي 🚕</h2>
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const list = document.getElementById("list");

db.ref("orders").on("value", snap => {
  list.innerHTML = "";
  let data = snap.val() || {};

  for(let id in data){
    let r = data[id];

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      🚕 ${r.pickup_location} → ${r.dropoff_location}<br>
      📅 ${r.pickup_date} ⏰ ${r.pickup_time}<br>
      👥 ${r.passenger_count} ركاب<br>
      💰 ${r.price} دينار<br>
      📌 ${r.status}
    `;

    if(r.status === "new"){
      let btn = document.createElement("button");
      btn.innerText = "قبول";
      btn.onclick = () => {
        db.ref("orders/" + id + "/status").set("accepted");
        alert("تم القبول");
      };
      div.appendChild(btn);
    }

    list.appendChild(div);
  }
});
</script>

</body>
</html>
