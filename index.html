<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السائق</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  margin:0;
  color:white;
}

/* الهيدر */
.header {
  background:white;
  color:black;
  padding:15px;
  text-align:center;
}

.card {
  margin:10px;
  padding:12px;
  border-radius:12px;
  color:white;
}

/* 🎨 نفس الألوان القديمة */
.sent { background:#f59e0b; }      /* برتقالي */
.accepted { background:#3b82f6; }  /* أزرق */
.completed { background:#10b981; }  /* أخضر */

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:white;
  color:black;
}
</style>
</head>

<body>

<div class="header">
  <h3 id="driverName">...</h3>
  <h2>💰 <span id="balance">0</span> JD</h2>
</div>

<div id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const driverId = localStorage.getItem("driverId");

if(!driverId){
  location.href="login.html";
}

const driverNameEl = document.getElementById("driverName");
const balanceEl = document.getElementById("balance");
const ordersEl = document.getElementById("orders");

/* 👨‍✈️ بيانات السائق */
db.ref("drivers/"+driverId).on("value",snap=>{
  let d = snap.val() || {};
  driverNameEl.innerText = d.name || "سائق";
  balanceEl.innerText = (d.balance || 0).toFixed(2);
});

/* 🚕 الطلبات */
db.ref("orders").on("value",snap=>{

  ordersEl.innerHTML = "";

  snap.forEach(o=>{
    let d = o.val();
    let id = o.key;

    if(d.driver_id && d.driver_id !== driverId) return;

    let btn = "";

    if(d.status === "sent"){
      btn = `<button onclick="accept('${id}')">قبول</button>`;
    }

    if(d.status === "accepted" && d.driver_id === driverId){
      btn = `<button onclick="complete('${id}')">إنهاء الرحلة</button>`;
    }

    ordersEl.innerHTML += `
      <div class="card ${d.status}">
        <p><b>${d.customer_name || ""}</b></p>
        <p>💰 ${d.price || 0} JD</p>
        ${btn}
      </div>
    `;
  });
});

/* قبول */
function accept(id){
  db.ref("orders/"+id).update({
    status:"accepted",
    driver_id:driverId
  });
}

/* إنهاء */
function complete(id){

  let ref = db.ref("orders/"+id);

  ref.once("value").then(snap=>{

    let o = snap.val();

    let commission = o.price * 0.12;
    let earn = o.price - commission;

    let driverRef = db.ref("drivers/"+driverId);

    driverRef.once("value").then(w=>{

      let d = w.val() || {};

      let newBalance = (d.balance || 0) - commission;

      driverRef.update({
        balance: newBalance,
        totalEarned: (d.totalEarned || 0) + earn,
        totalCommission: (d.totalCommission || 0) + commission
      });

      ref.update({status:"completed"});

      if(newBalance <= -1){
        driverRef.update({status:"blocked"});
        alert("🚫 تم إيقافك");
      } else {
        alert("تم إنهاء الرحلة");
      }

    });
  });
}
</script>

</body>
</html>
