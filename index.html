<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السائق</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.card { background:white; margin:10px; padding:10px; border-radius:10px; }
button { width:100%; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<h2>طلبات السائق 🚕</h2>
<div id="orders"></div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const sound = document.getElementById("sound");

// 🔥 real-time
db.ref("orders").on("value", snap=>{

  orders.innerHTML = "";

  if(snap.exists()){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  snap.forEach(o=>{

    let d = o.val();
    let id = o.key;

    let btn = "";

    if(d.status === "sent"){
      btn = `<button onclick="accept('${id}')">قبول</button>`;
    }

    if(d.status === "accepted" && d.driver_id === "driver123"){
      btn = `<button onclick="complete('${id}')">إنهاء الرحلة</button>`;
    }

    orders.innerHTML += `
      <div class="card">
        <p>${d.customer_name}</p>
        <p>${d.pickup_location} → ${d.dropoff_location}</p>
        <p>${d.price} JD</p>
        ${btn}
      </div>
    `;
  });
});

// قبول
function accept(id){

  db.ref("orders/"+id).update({
    status:"accepted",
    driver_id:"driver123"
  });

  alert("تم القبول 🚕");
}

// إنهاء الرحلة
function complete(id){

  const ref = db.ref("orders/"+id);

  ref.once("value").then(snap=>{

    let o = snap.val();

    if(o.status !== "accepted"){
      alert("❌");
      return;
    }

    let commission = o.price * 0.12;
    let earn = o.price - commission;

    // wallet
    const wallet = db.ref("wallets/drivers/driver123");

    wallet.once("value").then(w=>{

      let d = w.val() || {balance:0, transactions:{}};

      d.balance += earn;

      let t = Date.now();

      d.transactions[t] = {
        description: o.pickup_location+" → "+o.dropoff_location,
        date: new Date().toLocaleString(),
        credit: earn,
        commission: commission
      };

      wallet.set(d);
    });

    // أرشفة
    db.ref("myTrips/driver123/"+id).set({
      ...o,
      status:"completed",
      earned: earn,
      commission: commission
    });

    ref.update({status:"completed"});

    alert("تم إنهاء الرحلة ✅");
  });
}
</script>

</body>
</html>
