<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السائق</title>

<style>
body { font-family: Arial; background:#f0f0f0; }
.order {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
button {
  background:green;
  color:white;
  padding:10px;
  border:none;
  width:100%;
}
</style>
</head>

<body>

<h2>طلبات السائق 🚕</h2>
<div id="orders"></div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ordersDiv = document.getElementById("orders");
const sound = document.getElementById("sound");

// 🔥 REAL TIME
db.ref("orders").orderByChild("status").equalTo("sent")
.on("value", snap=>{

  ordersDiv.innerHTML="";

  if(snap.exists()){
    sound.play();
  }

  snap.forEach(child=>{
    const id = child.key;
    const o = child.val();

    ordersDiv.innerHTML += `
      <div class="order">
        <p>${o.customer_name}</p>
        <p>${o.pickup_location} → ${o.dropoff_location}</p>
        <p>${o.price} JD</p>
        <button onclick="accept('${id}')">قبول</button>
      </div>
    `;
  });
});

// 🚕 Accept (حماية + Wallet)
function accept(id){

  const ref = db.ref("orders/"+id);

  ref.once("value").then(snap=>{
    const o = snap.val();

    if(o.status !== "sent"){
      alert("تم أخذه من سائق آخر ❌");
      return;
    }

    ref.update({
      status:"accepted",
      driver_id:"driver123"
    });

    // 💰 wallet
    const wallet = db.ref("wallets/drivers/driver123");

    wallet.once("value").then(w=>{
      let data = w.val() || {balance:0, transactions:{}};

      data.balance += o.price;

      const t = Date.now();

      data.transactions[t] = {
        description: o.pickup_location + " → " + o.dropoff_location,
        date: new Date().toLocaleString(),
        credit: o.price
      };

      wallet.set(data);
    });

    alert("تم قبول الطلب 🚕");
  });
}
</script>

</body>
</html>
