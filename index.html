<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات السائق</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  background: #f0f4f8;
  padding: 20px;
}

h2 {
  color: #1f2937;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.btn {
  padding: 8px 12px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn:hover {
  background: #15803d;
}
</style>

</head>
<body>

<h2>طلبات التاكسي 🚕</h2>

<div id="ridesList"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const list = document.getElementById("ridesList");

// 🔄 جلب الطلبات realtime
db.ref("orders").on("value", snapshot => {
  const data = snapshot.val() || {};
  list.innerHTML = "";

  for(let id in data){
    const ride = data[id];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      🚕 <b>من:</b> ${ride.pickup_location} → <b>إلى:</b> ${ride.dropoff_location} <br><br>

      📅 <b>التاريخ:</b> ${ride.pickup_date || "-"} <br>
      ⏰ <b>الوقت:</b> ${ride.pickup_time || "-"} <br><br>

      👥 <b>عدد الركاب:</b> ${ride.passenger_count} <br>
      💰 <b>السعر:</b> ${ride.price} دينار <br><br>

      📌 <b>الحالة:</b> ${ride.status}
    `;

    // زر قبول الطلب
    if(ride.status === "new"){
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = "قبول الطلب ✅";
      btn.onclick = () => acceptRide(id);
      div.appendChild(btn);
    }

    list.appendChild(div);
  }
});

// ✅ قبول الطلب
function acceptRide(orderId){
  db.ref("orders/" + orderId + "/status").set("accepted");
  alert("تم قبول الطلب ✅");
}
</script>

</body>
</html>
