<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Taxi App - السائق</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  padding:20px;
  background:#f0f4f8;
}

#ordersList {
  margin-top:20px;
  text-align:right;
  font-size:18px;
}

.orderItem {
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  background:white;
}
</style>
</head>
<body>

<h2>طلبات الرحلات 🚗</h2>
<div id="ordersList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// عناصر الصفحة
const ordersList = document.getElementById("ordersList");

// عرض الطلبات live
db.ref("orders").on("value", snapshot => {
  ordersList.innerHTML = "";
  const orders = snapshot.val();
  if(!orders) return;
  Object.keys(orders).forEach(key => {
    const o = orders[key];
    const div = document.createElement("div");
    div.className = "orderItem";
    div.innerHTML = `
      <b>${o.customer_name}</b><br>
      ${o.pickup_location} → ${o.dropoff_location}<br>
      الركاب: ${o.passenger_count}<br>
      التاريخ: ${o.pickup_date} ${o.pickup_time}<br>
      السعر: ${o.price} دينار
    `;
    ordersList.appendChild(div);
  });
});
</script>

</body>
</html>
