<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات السائق</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
body { font-family: Arial, sans-serif; background:#f0f4f8; padding:20px; }
h2 { color:#1f2937; margin-bottom:20px; }
#ridesList li { margin-bottom:15px; padding:10px; background:#fff; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
button.acceptBtn { padding:8px 12px; border:none; border-radius:8px; background:#16a34a; color:white; cursor:pointer; transition:0.3s; }
button.acceptBtn:hover { background:#15803d; }
</style>
</head>
<body>

<h2>طلبات التاكسي (Realtime)</h2>
<button onclick="enableSound()">تشغيل الصوت 🔊</button>
<ul id="ridesList"></ul>

<audio id="bell" src="https://raw.githubusercontent.com/abuwaseim22/taxi-app/main/medium_bell.ogg" preload="auto"></audio>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);

let soundEnabled = false;
let displayedOrders = [];
let audio = document.getElementById("bell");

function enableSound(){
  soundEnabled = true;
  alert("تم تفعيل الصوت 🔊");
}

function playBellRepeated(times=3, interval=500){
  let count = 0;
  let timer = setInterval(() => {
    audio.play();
    count++;
    if(count >= times) clearInterval(timer);
  }, interval);
}

const db = firebase.database();
const list = document.getElementById("ridesList");

db.ref("orders").on("value", snapshot => {
  const data = snapshot.val() || {};
  list.innerHTML = "";

  for(let id in data){
    const ride = data[id];

    const li = document.createElement("li");
    li.innerHTML = `
      🚕 من: ${ride.pickup_location} | إلى: ${ride.dropoff_location} | 💰 ${ride.price} | حالة: ${ride.status} <br>
      ركاب: ${ride.passenger_count || ""} | ${ride.customer_name || ""} | ${ride.customer_phone || ""} <br>
      🚗 ${ride.car_type || ""} ${ride.car_number || ""} | سائق: ${ride.driver_name || ""} ${ride.driver_phone || ""}
    `;

    if(ride.status === "new"){
      const btn = document.createElement("button");
      btn.textContent = "قبول الطلب ✅";
      btn.className = "acceptBtn";
      btn.onclick = () => acceptRide(id);
      li.appendChild(btn);
    }

    list.appendChild(li);

    if(soundEnabled && !displayedOrders.includes(id) && ride.status === "new"){
      playBellRepeated();
    }
  }

  displayedOrders = Object.keys(data);
});

function acceptRide(orderId){
  db.ref(`orders/${orderId}/status`).set("accepted");
  alert("تم قبول الطلب ✅");
}
</script>
</body>
</html>
