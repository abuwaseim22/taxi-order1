<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>طلبات السائق</title>
<style>
body { font-family: Arial; background: #f5f5f5; padding: 10px; }
.request { background: #fff; margin: 5px 0; padding: 10px; border-radius: 5px; }
button { margin-right: 5px; padding: 5px 10px; }
</style>
</head>
<body>

<h2>طلبات جديدة</h2>
<div id="requests"></div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const sheetID = "PUT_YOUR_GOOGLE_SHEET_ID_HERE"; // ضع هنا Sheet ID
const sheetName = "TaxiRides";
let seenOrders = [];

function fetchRequests() {
  fetch(`https://opensheet.elk.sh/${sheetID}/${sheetName}`)
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("requests");
    container.innerHTML = "";

    data.forEach(row => {
      if(row.status === "new" && !seenOrders.includes(row.order_id)) {
        seenOrders.push(row.order_id);
        // تشغيل صوت التنبيه
        document.getElementById("alertSound").play();
      }

      if(row.status === "new") {
        const div = document.createElement("div");
        div.className = "request";
        div.innerHTML = `
          🚕 من: ${row.pickup_location} | إلى: ${row.dropoff_location} | 👥 ${row.passenger_count} | 💰 ${row.price}
          <br>
          <button onclick="alert('اضغط قبول في Thunkable')">قبول</button>
          <button onclick="alert('اضغط رفض في Thunkable')">رفض</button>
        `;
        container.appendChild(div);
      }
    });
  });
}

// جلب الطلبات كل 3 ثواني
fetchRequests();
setInterval(fetchRequests, 3000);
</script>

</body>
</html>
