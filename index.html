
<!DOCTYPE html>
<html>
<head>
<title>طلبات السائق</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  // === 1. إعداد Firebase ===
  const firebaseConfig = {
    apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
    authDomain: "abuwaseim-1e6a5.firebaseapp.com",
    databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com/",
    projectId: "abuwaseim-1e6a5",
    storageBucket: "abuwaseim-1e6a5.firebasestorage.app",
    messagingSenderId: "742009233210",
    appId: "1:742009233210:web:bbc875db2ece8db7ea3a03"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // === 2. مراقبة جدول الطلبات ===
  db.ref("orders").on("child_added", (snapshot) => {
    const order = snapshot.val();
    if(order.status === "new") {
      alert("لديك طلب جديد!\nمن: " + order.pickup + "\nإلى: " + order.dropoff);
      snapshot.ref.update({status: "seen"}); // لتجنب ظهور نفس الطلب مرتين
    }
  });
</script>
</head>
<body>
<h1>طلبات التاكسي للسائق</h1>
<p>صفحة مراقبة الطلبات.</p>
</body>
</html>
