<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السائق</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.card { background:white; margin:10px; padding:10px; border-radius:10px; }
button { width:100%; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<h2>طلبات السائق 🚕</h2>
<button onclick="logout()">تسجيل خروج</button>

<div id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔐 تسجيل الدخول
const driverId = localStorage.getItem("driverId");

if(!driverId){
  alert("سجل دخول أولاً");
  window.location.href = "login.html";
}

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ordersDiv = document.getElementById("orders");

// 🚕 عرض الطلبات (فلترة ذكية)
db.ref("orders").on("value", snap=>{

  ordersDiv.innerHTML = "";

  db.ref("drivers/"+driverId).once("value").then(driverSnap=>{

    let driver = driverSnap.val() || {};
    let balance = Number(driver.balance || 0);

    // 🔥 block / unblock
    if(balance <= -1){
      db.ref("drivers/"+driverId).update({status:"blocked"});
      ordersDiv.innerHTML = "<h3>❌ حسابك موقوف</h3>";
      return;
    } else {
      db.ref("drivers/"+driverId).update({status:"active"});
    }

    snap.forEach(o=>{

      let d = o.val();
      let id = o.key;

      // 🔥 فلترة
      if(d.driver_id && d.driver_id !== driverId){
        return;
      }

      let btn = "";

      if(!d.driver_id && d.status === "sent"){
        btn = `<button onclick="accept('${id}')">قبول</button>`;
      }

      if(d.status === "accepted" && d.driver_id === driverId){
        btn = `<button onclick="complete('${id}')">إنهاء الرحلة</button>`;
      }

      ordersDiv.innerHTML += `
        <div class="card">
          <p>${d.customer_name}</p>
          <p>${d.pickup_location} → ${d.dropoff_location}</p>
          <p>${d.price} JD</p>
          ${btn}
        </div>
      `;
    });

  });

});


// 🚕 قبول
function accept(id){

  db.ref("drivers/"+driverId).once("value").then(driverSnap=>{

    let driver = driverSnap.val() || {};
    let balance = Number(driver.balance || 0);

    if(balance <= -1){
      alert("❌ لا يمكنك القبول");
      return;
    }

    db.ref("orders/"+id).update({
      status:"accepted",
      driver_id:driverId
    });

  });

}


// 🏁 إنهاء
function complete(id){

  const ref = db.ref("orders/"+id);

  ref.once("value").then(snap=>{

    let o = snap.val();

    let commission = o.price * 0.12;
    let earn = o.price - commission;

    let wallet = db.ref("drivers/"+driverId);

    wallet.once("value").then(w=>{

      let d = w.val() || {balance:0};

      if(d.balance <= 0){
        d.balance -= commission;
      } else {
        d.balance += earn;
      }

      wallet.set(d);

    });

    ref.update({status:"completed"});

    alert("تم إنهاء الرحلة ✅");

  });
}


// 🔓 تسجيل خروج
function logout(){
  localStorage.removeItem("driverId");
  window.location.href = "login.html";
}

</script>

</body>
</html>
