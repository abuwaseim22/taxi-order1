<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات التاكسي</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
  body { font-family: Arial; direction: rtl; padding: 20px; }
  li { background: #eee; margin: 5px; padding: 10px; }
</style>
</head>
<body>

<h2>طلبات التاكسي (Realtime)</h2>
<button onclick="enableSound()">تشغيل الصوت 🔊</button>

<ul id="ridesList"></ul>

<script>
// 🔥 ضع إعداداتك هنا
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);

let soundEnabled = false;
let displayedOrders = [];

let audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-01a.mp3");

function enableSound() {
  soundEnabled = true;
  alert("تم تفعيل الصوت");
}

const db = firebase.database();
const list = document.getElementById("ridesList");

// 🔥 استماع مباشر (Realtime)
db.ref("orders").on("value", snapshot => {
  const data = snapshot.val();
  list.innerHTML = "";

  for(let id in data){
    const ride = data[id];

    const li = document.createElement("li");
    li.textContent = `🚕 من: ${ride.pickup_location} | إلى: ${ride.dropoff_location} | 💰 ${ride.price} | الحالة: ${ride.status}`;
    list.appendChild(li);

    // 🔊 صوت
    if(
      soundEnabled &&
      !displayedOrders.includes(id) &&
      ride.status === "new"
    ){
      audio.play();
    }
  }

  displayedOrders = Object.keys(data || {});
});
</script>

</body>
</html>
