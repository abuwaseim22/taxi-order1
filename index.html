<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السائق</title>

<style>
body{font-family:Arial;background:#f4f4f4}
.card{background:white;margin:10px;padding:10px;border-radius:10px}
button{width:100%;padding:10px}
</style>
</head>

<body>

<h2>طلبات السائق 🚕</h2>
<div id="orders"></div>

<audio id="sound"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
authDomain:"abuwaseim-1e6a5.firebaseapp.com",
databaseURL:"https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
projectId:"abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const driverId="driver123";
const ordersDiv=document.getElementById("orders");

db.ref("orders").on("value",snap=>{
ordersDiv.innerHTML="";

snap.forEach(o=>{
let d=o.val();
let id=o.key;

let btn="";

if(d.status==="sent"){
btn=`<button onclick="accept('${id}')">قبول</button>`;
}

if(d.status==="accepted" && d.driver_id===driverId){
btn=`<button onclick="complete('${id}')">إنهاء</button>`;
}

ordersDiv.innerHTML+=`
<div class="card">
<p>${d.customer_name}</p>
<p>${d.pickup_location} → ${d.dropoff_location}</p>
<p>${d.price} JD</p>
${btn}
</div>`;
});
});

function accept(id){
db.ref("orders/"+id).update({
status:"accepted",
driver_id:driverId
});
}

function complete(id){

db.ref("orders/"+id).once("value").then(snap=>{
let o=snap.val();

let commission=o.price*0.12;
let earn=o.price-commission;

let wallet=db.ref("wallets/drivers/"+driverId);

wallet.once("value").then(w=>{
let d=w.val()||{balance:0,transactions:{}};

d.balance+=earn;

d.transactions[Date.now()]={
description:o.pickup_location+" → "+o.dropoff_location,
date:new Date().toLocaleString(),
credit:earn,
commission:commission
};

wallet.set(d);
});

db.ref("myTrips/"+driverId+"/"+id).set({
...o,
status:"completed",
earned:earn,
commission:commission
});

db.ref("orders/"+id).update({status:"completed"});
});
}
</script>

</body>
</html>
