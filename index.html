<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تطبيق السائق - المبدع v2</title>
<style>
body {
  font-family: Arial,sans-serif;
  margin:0;
  padding:20px;
  background:#f0f4f8;
}

.orderCard {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.orderCard h3{
  margin:0 0 5px 0;
}

.orderCard p{
  margin:3px 0;
  font-size:16px;
}
</style>
</head>
<body>
<h2>طلبات جديدة 🚕</h2>
<div id="ordersContainer"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("ordersContainer");

db.ref("orders").on("value", snapshot=>{
  container.innerHTML="";
  snapshot.forEach(snap=>{
    const order = snap.val();
    if(order.status==="new"){
      const card = document.createElement("div");
      card.className="orderCard";
      card.innerHTML = `
        <h3>${order.customer_name} 🚕 ${order.pickup_location} → ${order.dropoff_location}</h3>
        <p>هاتف: ${order.customer_phone}</p>
        <p>ركاب: ${order.passenger_count}</p>
        <p>التاريخ: ${order.pickup_date} | الوقت: ${order.pickup_time}</p>
        <p>السعر: ${order.price} دينار</p>
      `;
      container.appendChild(card);
    }
  });
});
</script>
</body>
</html>
