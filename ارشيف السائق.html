<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلباتي</title>
</head>

<body>

<h2>طلباتي 📋</h2>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com",
  projectId: "abuwaseim-1e6a5"
};

firebase.initializeApp(firebaseConfig);

const driverId = "driver123";

firebase.database()
.ref("myTrips/"+driverId)
.on("value", snap => {

  const div = document.getElementById("list");
  div.innerHTML = "";

  snap.forEach(o => {

    const d = o.val();

    div.innerHTML += `
      <div style="border:1px solid #ccc; margin:10px; padding:10px;">
        <p><b>من:</b> ${d.pickup_location}</p>
        <p><b>إلى:</b> ${d.dropoff_location}</p>
        <p><b>السعر:</b> ${d.price}</p>
        <p><b>العمولة:</b> ${d.commission}</p>
        <p><b>الصافي:</b> ${d.earned}</p>
        <p><b>رقم الرحلة:</b> ${o.key}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
