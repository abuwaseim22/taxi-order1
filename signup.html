<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل سائق</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1e40af;
}

#msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
<h2>إنشاء حساب 🚕</h2>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">تسجيل</button>

<p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyD9Y8TqIixyLGuv7C5WrWxl2XGmIvWtul8",
  authDomain: "abuwaseim-1e6a5.firebaseapp.com",
  databaseURL: "https://abuwaseim-1e6a5-default-rtdb.firebaseio.com"
});

const auth = firebase.auth();
const db = firebase.database();

function register(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("password").value;

  if(!name || !phone || !pass){
    msg.innerText = "عبّي البيانات ❌";
    return;
  }

  let email = phone + "@taxi.com";

  auth.createUserWithEmailAndPassword(email, pass)
  .then(u=>{

    let uid = u.user.uid;

    db.ref("drivers/"+uid).set({
      name,
      phone,
      balance:0,
      status:"active",
      totalEarned:0,
      totalCommission:0
    });

    msg.innerText = "تم التسجيل ✅";

    setTimeout(()=>{
      location.href="login.html";
    },1000);

  })
  .catch(e=>{
    msg.innerText = e.message;
  });

}
</script>

</body>
</html>
